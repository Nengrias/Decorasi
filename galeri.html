<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Foto Modern</title>
    <style>
        /* Reset Dasar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            color: #2c3e50;
        }

        /* Layout Galeri */
        .gallery-container {
            display: grid;
            /* Membuat grid 3 kolom pada layar besar */
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Styling Item Foto */
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            background-color: #fff;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
        }

        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        /* Caption saat di-hover */
        .caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 10px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gallery-item:hover .caption {
            opacity: 1;
        }

        /* Khusus untuk foto ke-7 agar tampil lebih unik jika jumlahnya ganjil */
        @media (min-width: 900px) {
            .gallery-item:nth-child(7) {
                grid-column: span 1;
            }
        }

        footer {
            text-align: center;
            margin-top: 50px;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>
<body>

    <header>
        <h1>Koleksi Galeri Dekorasi</h1>
        <p>Menampilkan momen terbaik dalam satu tampilan.</p>
    </header>

    <main class="gallery-container">
        <div class="gallery-item">
            <img src="1.jpg" alt="Foto 1">
            <div class="caption">Momen Pertama</div>
        </div>

        <div class="gallery-item">
            <img src="2.jpg" alt="Foto 2">
            <div class="caption">Momen Kedua</div>
        </div>

        <div class="gallery-item">
            <img src="3.jpeg" alt="Foto Hena">
            <div class="caption">Henna Art</div>
        </div>

        <div class="gallery-item">
            <img src="pengantin.jpg" alt="Foto 3">
            <div class="caption">Pengantin</div>
        </div>

        <div class="gallery-item">
            <img src="maulid.jpg" alt="Foto 3">
            <div class="caption">Maulid</div>
        </div>

        <div class="gallery-item">
            <img src="4.jpg" alt="Foto 4">
            <div class="caption">Momen Empat</div>
        </div>

        <div class="gallery-item">
            <img src="5.jpg" alt="Foto 5">
            <div class="caption">Momen lima</div>
        </div>
        
        <div class="gallery-item">
            <img src="6.JPG" alt="Foto 6">
            <div class="caption">Momen Enam</div>
        </div>
        
        <div class="gallery-item">
            <img src="7.JPG" alt="Foto 7">
            <div class="caption">Momen Tujuh
         </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Neng Rias.</p>
    </footer>

</body>
</html>
